# Runs the chores-web stack from published images.
#
# Development now happens in the split repositories:
#   https://github.com/derekwinters/chores-web-backend
#   https://github.com/derekwinters/chores-web-frontend
#
# Images default to :latest. To pin a version, replace the tags below
# (e.g. ghcr.io/derekwinters/chores-web-backend:2.1.0). Published versions:
#   https://github.com/derekwinters/chores-web-backend/releases
#   https://github.com/derekwinters/chores-web-frontend/releases

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chores
      POSTGRES_USER: chores
      POSTGRES_PASSWORD: chores
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chores"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/derekwinters/chores-web-backend:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://chores:chores@db/chores
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/derekwinters/chores-web-frontend:latest
    ports:
      - "0.0.0.0:3000:80"
    depends_on:
      - backend
    restart: unless-stopped
