name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          release-type: simple
          skip-github-pull-request: false
          skip-github-release: false
          target-branch: main
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        if: ${{ steps.release.outputs.release_created }}
      - name: Tag Docker image
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0
      - name: Build and push backend image
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ steps.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push frontend image
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ steps.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Create release notes
        if: ${{ steps.release.outputs.release_created }}
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          cat > RELEASE_NOTES.md << EOF
          # Version $RELEASE_VERSION

          ## Docker Images

          - Frontend: \`ghcr.io/${{ github.repository }}/frontend:$RELEASE_VERSION\`
          - Backend: \`ghcr.io/${{ github.repository }}/backend:$RELEASE_VERSION\`

          ## Run with Docker Compose

          \`\`\`yaml
          version: '3.8'
          services:
            frontend:
              image: ghcr.io/${{ github.repository }}/frontend:$RELEASE_VERSION
              ports:
                - "3000:80"
            backend:
              image: ghcr.io/${{ github.repository }}/backend:$RELEASE_VERSION
              ports:
                - "8000:8000"
          \`\`\`

          See [Deployment Guide](./docs/DEPLOYMENT.md) for full setup instructions.
          EOF
