name: MkDocs Preview

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs-preview.yml'

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install MkDocs
        run: |
          pip install mkdocs mkdocs-material
      - name: Build documentation
        run: mkdocs build --strict
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: site/
          retention-days: 5
      - name: Comment PR with docs link
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const siteUrl = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const comment = `📚 Documentation preview built successfully!\n\nYou can download the built site from the [artifacts](${siteUrl}).`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
