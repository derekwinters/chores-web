name: MkDocs Preview

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs-preview.yml'

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
      - name: Install MkDocs
        run: |
          pip install mkdocs mkdocs-material mkdocstrings[python]
      - name: Build documentation
        run: mkdocs build --strict
      - name: Upload site artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mkdocs-site
          path: site/
          retention-days: 5
      - name: Comment PR with docs link
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const siteUrl = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const comment = `📚 Documentation preview built successfully!\n\nYou can download the built site from the [artifacts](${siteUrl}).`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
