name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run tests
        run: cd frontend && npm test -- --run
      - name: Upload coverage
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        if: matrix.node-version == '20.x'
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
      - name: Run tests
        run: |
          cd backend
          pytest --cov=app --cov-report=xml
        env:
          JWT_SECRET: ci-test-secret
      - name: Upload coverage
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        if: matrix.python-version == '3.12'
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install linting tools
        run: |
          pip install black flake8 isort
      - name: Check Python formatting
        run: |
          cd backend
          black --check app/ || true
          flake8 app/ || true
          isort --check-only app/ || true
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Node dependencies
        run: cd frontend && npm ci
      - name: Check JS formatting
        run: cd frontend && npm run lint 2>/dev/null || echo "No lint script"

  build:
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0
      - name: Build frontend
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build backend
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-notes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Check for release notes on release PRs
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          if echo "$PR_TITLE" | grep -qE '^chore\(main\): release v'; then
            VERSION=$(echo "$PR_TITLE" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
            RELEASE_FILE="docs/blog/posts/release-${VERSION}.md"
            if [ ! -f "$RELEASE_FILE" ]; then
              echo "Release PR detected for ${VERSION} but release notes file is missing: ${RELEASE_FILE}"
              echo "Please create ${RELEASE_FILE} before merging this release PR."
              exit 1
            else
              echo "Release notes found: ${RELEASE_FILE}"
            fi
          else
            echo "Non-release PR — skipping release notes check."
          fi

  api-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate current OpenAPI snapshot
        run: cd backend && python ../scripts/generate_openapi.py --output /tmp/openapi-current.json
        env:
          JWT_SECRET: ci-check-only
      - name: Install oasdiff
        run: |
          OASDIFF_VERSION=$(curl -s https://api.github.com/repos/oasdiff/oasdiff/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSfL "https://github.com/oasdiff/oasdiff/releases/download/${OASDIFF_VERSION}/oasdiff_linux_amd64.tar.gz" -o /tmp/oasdiff.tar.gz
          tar -xzf /tmp/oasdiff.tar.gz -C /usr/local/bin oasdiff
          chmod +x /usr/local/bin/oasdiff
      - name: Check for breaking changes
        run: |
          CURRENT_VERSION=$(cat API_VERSION | tr -d '[:space:]')
          oasdiff breaking docs/api/openapi.json /tmp/openapi-current.json --fail-on ERR
          echo "API contract check passed (version: $CURRENT_VERSION)"

  upgrade-regression:
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve latest published GHCR tag
        id: prev-tag
        run: |
          PREV_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' | sed 's/^v//')
          if [ -z "$PREV_TAG" ]; then
            echo "No previous release found; skipping upgrade regression test" >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Previous release tag: $PREV_TAG"
            echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run upgrade regression test
        if: steps.prev-tag.outputs.skip == 'false'
        env:
          PREV_TAG: ${{ steps.prev-tag.outputs.prev_tag }}
        run: |
          docker compose -f docker-compose.test-upgrade.yml up --build -d
          docker compose -f docker-compose.test-upgrade.yml wait validate
      - name: Collect validate service logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.test-upgrade.yml logs new-backend validate || true
      - name: Tear down upgrade test containers
        if: always()
        run: |
          docker compose -f docker-compose.test-upgrade.yml down --volumes --remove-orphans || true
